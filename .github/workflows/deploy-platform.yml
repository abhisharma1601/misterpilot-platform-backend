name: Deploy Platform Backend

on:
  push:
    branches:
      - release/main
      - main

jobs:
  deploy-release:
    if: github.ref == 'refs/heads/release/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 (Release)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/DeployScripts
            sudo bash deployPlatform.sh

  deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 (Production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER_PROD }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            cd /home/ubuntu/DeployScripts
            sudo bash deployPlatform.sh
